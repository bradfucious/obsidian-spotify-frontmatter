name: CI

on:
  push:
  pull_request:

# Explicitly declare least-privilege permissions.
# This overrides the default 'contents: write' (or write-all in some orgs)
# so the workflow cannot make unintended changes to the repository.
# Individual jobs that need elevated permissions should declare them locally.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint .

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
          strict: false

      - name: Run tests
        run: npm test
